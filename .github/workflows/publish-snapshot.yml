name: Publish Snapshot

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish Maven snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.PGP_SECRET }}
      SIGNING_PASSWORD: ${{ secrets.PGP_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test and publish snapshot
        run: ./gradlew check publishSnapshot --stacktrace --no-daemon
